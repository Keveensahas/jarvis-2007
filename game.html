<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Snake Pro</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at center, #0f2027, #203a43, #2c5364);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  color: white;
}

/* Screens */
.screen {
  text-align: center;
}

.hidden {
  display: none;
}

/* Buttons */
button {
  padding: 12px 25px;
  font-size: 16px;
  border: none;
  background: linear-gradient(45deg, #00c6ff, #0072ff);
  color: white;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.3s;
}
button:hover {
  transform: scale(1.05);
}

/* Game container */
#game-container {
  position: relative;
}

/* Score */
#scoreboard {
  position: absolute;
  top: -50px;
  right: 0;
  text-align: right;
}

/* Canvas */
canvas {
  background: rgba(0,0,0,0.4);
  border: 2px solid #00c6ff;
  box-shadow: 0 0 20px #00c6ff;
}
</style>
</head>

<body>

<!-- Landing -->
<div id="landing" class="screen">
  <h1>Snake Pro</h1>
  <button id="playBtn">Play</button>
</div>

<!-- Game -->
<div id="game-container" class="hidden">
  <div id="scoreboard">
    <div id="score">Score: 0</div>
    <div id="highScore">High: 0</div>
  </div>
  <canvas id="game" width="500" height="500"></canvas>
</div>

<!-- Game Over -->
<div id="gameOver" class="screen hidden">
  <h2>Game Over</h2>
  <p id="finalScore"></p>
  <button id="restartBtn">Play Again</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const landing = document.getElementById("landing");
const gameContainer = document.getElementById("game-container");
const gameOverScreen = document.getElementById("gameOver");

const scoreEl = document.getElementById("score");
const highScoreEl = document.getElementById("highScore");
const finalScoreEl = document.getElementById("finalScore");

const grid = 20;
const tileCount = canvas.width / grid;

let snake, food, direction, score, speed, lastTime, particles, paused;
let highScore = localStorage.getItem("snakeHigh") || 0;

// Init
function init() {
  snake = [{x: 10, y: 10}];
  direction = "RIGHT";
  score = 0;
  speed = 6;
  particles = [];
  paused = false;
  spawnFood();
  updateScore();
}

// Start
function startGame() {
  landing.classList.add("hidden");
  gameOverScreen.classList.add("hidden");
  gameContainer.classList.remove("hidden");

  init();
  lastTime = 0;
  requestAnimationFrame(gameLoop);
}

// Game Loop (smooth)
function gameLoop(time) {
  if (paused) {
    requestAnimationFrame(gameLoop);
    return;
  }

  if (time - lastTime > 1000 / speed) {
    update();
    draw();
    lastTime = time;
  }

  requestAnimationFrame(gameLoop);
}

// Update
function update() {
  const head = {...snake[0]};

  if (direction === "UP") head.y--;
  if (direction === "DOWN") head.y++;
  if (direction === "LEFT") head.x--;
  if (direction === "RIGHT") head.x++;

  snake.unshift(head);

  if (eatFood()) {
    score++;
    createParticles(head);
    spawnFood();
    updateScore();

    if (score % 5 === 0) speed += 1;
  } else {
    snake.pop();
  }

  if (collision(head)) endGame();
}

// Draw
function draw() {
  // Background grid glow
  ctx.fillStyle = "rgba(0,0,0,0.3)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Snake
  snake.forEach((part, i) => {
    ctx.fillStyle = i === 0 ? "#00ffcc" : "#00cc99";
    ctx.shadowBlur = 10;
    ctx.shadowColor = "#00ffcc";
    ctx.fillRect(part.x * grid, part.y * grid, grid-2, grid-2);
  });

  // Food (glow)
  ctx.fillStyle = "#ff3b3b";
  ctx.shadowColor = "#ff0000";
  ctx.shadowBlur = 20;
  ctx.fillRect(food.x * grid, food.y * grid, grid-2, grid-2);

  // Particles
  particles.forEach((p, index) => {
    p.x += p.vx;
    p.y += p.vy;
    p.life--;

    ctx.fillStyle = "yellow";
    ctx.fillRect(p.x, p.y, 3, 3);

    if (p.life <= 0) particles.splice(index, 1);
  });
}

// Food
function spawnFood() {
  food = {
    x: Math.floor(Math.random()*tileCount),
    y: Math.floor(Math.random()*tileCount)
  };
}

// Eat
function eatFood() {
  return snake[0].x === food.x && snake[0].y === food.y;
}

// Collision
function collision(head) {
  if (head.x < 0 || head.y < 0 || head.x >= tileCount || head.y >= tileCount) return true;

  for (let i=1;i<snake.length;i++){
    if (head.x === snake[i].x && head.y === snake[i].y) return true;
  }
  return false;
}

// Particles
function createParticles(pos) {
  for (let i=0;i<15;i++){
    particles.push({
      x: pos.x * grid,
      y: pos.y * grid,
      vx: (Math.random()-0.5)*4,
      vy: (Math.random()-0.5)*4,
      life: 20
    });
  }
}

// Score
function updateScore() {
  scoreEl.textContent = "Score: " + score;
  highScoreEl.textContent = "High: " + highScore;
}

// End
function endGame() {
  gameContainer.classList.add("hidden");
  gameOverScreen.classList.remove("hidden");

  if (score > highScore) {
    highScore = score;
    localStorage.setItem("snakeHigh", highScore);
  }

  finalScoreEl.textContent = "Final Score: " + score;
}

// Controls
document.addEventListener("keydown", e => {
  if (e.key === " ") paused = !paused;

  if (e.key === "ArrowUp" && direction !== "DOWN") direction = "UP";
  if (e.key === "ArrowDown" && direction !== "UP") direction = "DOWN";
  if (e.key === "ArrowLeft" && direction !== "RIGHT") direction = "LEFT";
  if (e.key === "ArrowRight" && direction !== "LEFT") direction = "RIGHT";
});

// Buttons
document.getElementById("playBtn").onclick = startGame;
document.getElementById("restartBtn").onclick = startGame;
</script>

</body>
</html>
